# Продакшен (автономный файл):
# docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Базовые образы: public.ecr.aws/docker/library/* (AWS Public ECR, без Docker Hub / логина).
# Версии своих образов: IMAGE_TAG, BACKEND_IMAGE_NAME, FRONTEND_IMAGE_NAME.
services:
  db:
    image: public.ecr.aws/docker/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kaiten}
      POSTGRES_USER: ${POSTGRES_USER:-kaiten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kaiten}
    volumes:
      - kaiten_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: unless-stopped
    volumes:
      - kaiten_redis_data:/data

  backend:
    image: ${BACKEND_IMAGE_NAME:-kaiten-backend}:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - kaiten_media:/app/media
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kaiten}:${POSTGRES_PASSWORD:-kaiten}@db:5432/${POSTGRES_DB:-kaiten}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY_BEAT: "1"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      MEDIA_ROOT: /app/media
      MEDIA_URL: /media/
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SSL: ${SMTP_SSL:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # /health/live раньше был недоступен, пока create_pool блокировал startup — контейнер «unhealthy».
    # Теперь API сразу слушает порт; готовность с БД — только /health/ready (HTTP 200).
    healthcheck:
      # 503 пока БД не поднята — curl -f считает это ошибкой; в start_period провалы не копятся.
      test: ["CMD-SHELL", "curl -sf --max-time 25 http://127.0.0.1:8000/health/ready >/dev/null"]
      interval: 10s
      timeout: 30s
      retries: 18
      start_period: 40s
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8000

  celery_worker:
    image: ${BACKEND_IMAGE_NAME:-kaiten-backend}:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - kaiten_media:/app/media
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kaiten}:${POSTGRES_PASSWORD:-kaiten}@db:5432/${POSTGRES_DB:-kaiten}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MEDIA_ROOT: /app/media
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SSL: ${SMTP_SSL:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A fastapi_app.celery_app worker -l info

  celery_beat:
    image: ${BACKEND_IMAGE_NAME:-kaiten-backend}:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kaiten}:${POSTGRES_PASSWORD:-kaiten}@db:5432/${POSTGRES_DB:-kaiten}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A fastapi_app.celery_app beat -l info

  frontend:
    image: ${FRONTEND_IMAGE_NAME:-kaiten-frontend}:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""

  nginx:
    image: public.ecr.aws/docker/library/nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/includes:/etc/nginx/conf.d/includes:ro
      - ./deploy/nginx/snippets/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  db_backup:
    image: public.ecr.aws/docker/library/alpine:3.20
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-kaiten}
      POSTGRES_USER: ${POSTGRES_USER:-kaiten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kaiten}
    volumes:
      - kaiten_pg_backups:/backups
      - ./deploy/backup/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  kaiten_db_data:
  kaiten_redis_data:
  kaiten_media:
  kaiten_pg_backups:
