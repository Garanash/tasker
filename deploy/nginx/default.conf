# TLS: сертификаты Let's Encrypt на хосте → /etc/letsencrypt (см. docker-compose.prod.yml).
# Docker: resolver + переменные в proxy_pass — см. includes/proxy-preamble.conf.

# HTTP: домен — ACME webroot + редирект на HTTPS
server {
    listen 80;
    server_name agbtasker.ru www.agbtasker.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: основной сайт
server {
    listen 443 ssl;
    http2 on;
    server_name agbtasker.ru www.agbtasker.ru;

    ssl_certificate     /etc/letsencrypt/live/agbtasker.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agbtasker.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/agbtasker.ru/chain.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/conf.d/includes/proxy-preamble.conf;
    include /etc/nginx/conf.d/includes/proxy-locations.conf;
}

# HTTP по IP (без TLS)
server {
    listen 80 default_server;
    server_name _;

    include /etc/nginx/conf.d/includes/proxy-preamble.conf;
    include /etc/nginx/conf.d/includes/proxy-locations.conf;
}
