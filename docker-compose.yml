services:
  db:
    image: public.ecr.aws/docker/library/postgres:16
    environment:
      POSTGRES_DB: kaiten
      POSTGRES_USER: kaiten
      POSTGRES_PASSWORD: kaiten
    volumes:
      - kaiten_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaiten"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://kaiten:kaiten@db:5432/kaiten
      REDIS_URL: ${REDIS_URL:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-}
      USE_CELERY_BEAT: ${USE_CELERY_BEAT:-0}
      SECRET_KEY: dev-secret-key-change-me
      MEDIA_ROOT: /app/media
      MEDIA_URL: /media/
      # Почта: задайте в корневом `.env` (см. `.env.example`). Compose подставляет переменные автоматически.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SSL: ${SMTP_SSL:-1}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8000

volumes:
  kaiten_db_data:
